<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>my-family-chart</title>
    <script src="https://unpkg.com/d3@7"></script>
    <script type="module" src="https://unpkg.com/family-chart@0.9.0"></script>
    <link
      rel="stylesheet"
      href="https://unpkg.com/family-chart@0.9.0/dist/styles/family-chart.css"
    />
    <style>
      body {
        font-family: "Arial", sans-serif;
      }

      .export-panel {
        padding: 12px;
        background: #f5f5f5;
        color: #111;
        border-bottom: 1px solid #ddd;
      }

      .export-panel button {
        padding: 8px 14px;
        margin-right: 8px;
        cursor: pointer;
      }

      #exportedData {
        display: none;
        width: 100%;
        height: 260px;
        margin-top: 10px;
        font-family: monospace;
        font-size: 13px;
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <div class="export-panel">
      <button id="exportDataBtn" type="button">Get updated data</button>
      <button id="copyDataBtn" type="button" style="display: none">
        Copy data
      </button>
      <span id="exportStatus"></span>
      <textarea
        id="exportedData"
        readonly
        placeholder="Your updated data will appear here..."
      ></textarea>
    </div>

    <div
      id="FamilyChart"
      class="f3"
      style="
        width: 100%;
        height: 900px;
        margin: auto;
        background-color: rgb(33, 33, 33);
        color: #fff;
      "
    ></div>
    <script type="module">
      const familyData = data();
      let f3ChartInstance = null;

      create(familyData);
      setupExportButtons();

      function create(data) {
        const f3Chart = f3
          .createChart("#FamilyChart", data)
          .setTransitionTime(1000)
          .setCardXSpacing(250)
          .setCardYSpacing(150)
          .setSingleParentEmptyCard(true, { label: "ADD" })
          .setShowSiblingsOfMain(false)
          .setOrientationVertical();

        f3ChartInstance = f3Chart;

        const f3Card = f3Chart
          .setCardHtml()
          .setCardDisplay([["first name", "last name"], ["birthday"]])
          .setCardDim(null)
          .setMiniTree(true)
          .setStyle("imageRect")
          .setOnHoverPathToMain();

        const f3EditTree = f3Chart
          .editTree()
          .fixed(true)
          .setFields(["first name", "last name", "birthday", "avatar"])
          .setEditFirst(true)
          .setCardClickOpen(f3Card);

        f3EditTree.setEdit();

        f3Chart.updateTree({ initial: true });
        f3EditTree.open(f3Chart.getMainDatum());

        f3Chart.updateTree({ initial: true });
      }

      function setupExportButtons() {
        const exportBtn = document.getElementById("exportDataBtn");
        const copyBtn = document.getElementById("copyDataBtn");
        const output = document.getElementById("exportedData");
        const status = document.getElementById("exportStatus");

        exportBtn.addEventListener("click", () => {
          const latestData = getLatestFamilyData();
          output.value = `function data() {\n  return ${JSON.stringify(
            latestData,
            null,
            2,
          )};\n}`;
          output.style.display = "block";
          copyBtn.style.display = "inline-block";
          status.textContent =
            "Data is ready. Copy it and replace your old data() function.";
        });

        copyBtn.addEventListener("click", async () => {
          output.select();
          output.setSelectionRange(0, output.value.length);

          try {
            await navigator.clipboard.writeText(output.value);
            status.textContent = "Copied!";
          } catch (error) {
            document.execCommand("copy");
            status.textContent = "Copied!";
          }
        });
      }

      function getLatestFamilyData() {
        if (f3ChartInstance && typeof f3ChartInstance.getData === "function") {
          return f3ChartInstance.getData();
        }

        if (
          f3ChartInstance &&
          typeof f3ChartInstance.getChartState === "function"
        ) {
          const state = f3ChartInstance.getChartState();
          if (state && state.data) {
            return state.data;
          }
        }

        // The editor mutates the original array, so this keeps all edits.
        return familyData;
      }
